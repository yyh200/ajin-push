name: 阿金晚报 17:00

on:
  # schedule disabled — replaced by 14:45 portfolio_report
  # schedule:
  #   - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  evening-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run evening report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          QQ_MAIL_ADDR: ${{ secrets.QQ_MAIL_ADDR }}
          QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
        run: python scripts/evening_report.py
