name: 阿金早报 08:55

on:
  schedule:
    # 每10分钟，07:00-07:50 BJT（=23:00-23:50 UTC 周日-四）
    - cron: '*/10 23 * * 0-4'
    # 每10分钟，08:00-09:50 BJT（=00:00-01:50 UTC 周一-五）
    - cron: '*/10 0,1 * * 1-5'
  workflow_dispatch:

jobs:
  morning-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run morning report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          QQ_MAIL_ADDR: ${{ secrets.QQ_MAIL_ADDR }}
          QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
        run: python scripts/morning_report.py
