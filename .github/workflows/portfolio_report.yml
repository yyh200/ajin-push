name: 阿金持仓分析 14:45

on:
  schedule:
    - cron: '45 6 * * 1-5'   # 14:45 BJT = 06:45 UTC, 周一至周五
  workflow_dispatch:

concurrency:
  group: portfolio-report
  cancel-in-progress: false

jobs:
  portfolio-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Portfolio Report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          QQ_MAIL_ADDR: ${{ secrets.QQ_MAIL_ADDR }}
          QQ_MAIL_AUTH_CODE: ${{ secrets.QQ_MAIL_AUTH_CODE }}
        run: python3 scripts/portfolio_report.py
